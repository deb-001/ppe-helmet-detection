
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PPE Helmet Detection — Flask</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    h2 { margin-top: 0; }
    img { max-width: 100%; border-radius: 10px; }
    .preview { width: 100%; min-height: 120px; border: 1px dashed #aaa; border-radius: 10px; display:flex; align-items:center; justify-content:center; }
    button { padding: 10px 16px; border-radius: 10px; border: 1px solid #444; cursor: pointer; }
    input[type=file]{ display:block; margin-top: 8px; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>PPE Helmet Detection — Flask</h1>
  <p>Model: <b>{{ model_type or "not loaded" }}</b> &nbsp; | &nbsp; Score ≥ {{ score }} &nbsp; | &nbsp; IoU ≥ {{ iou }}</p>
  <div class="wrap">
    <div class="card">
      <h2>Webcam (server-side)</h2>
      <p>Start the app on the PC with the camera. If nothing shows, free the webcam or change <code>CAM_INDEX</code>.</p>
      <img id="cam" src="/video_feed" alt="webcam stream" />
    </div>
    <div class="card">
      <h2>Test Pre-captured Image</h2>
      <input type="file" id="file" accept="image/*">
      <div class="preview" id="preview">Choose an image…</div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file');
    const preview = document.getElementById('preview');
    fileInput.addEventListener('change', async () => {
      const f = fileInput.files[0];
      if(!f) return;
      const fd = new FormData();
      fd.append('image', f);
      preview.textContent = 'Processing…';
      const res = await fetch('/infer_upload', { method: 'POST', body: fd });
      if (!res.ok) {
        preview.textContent = 'Error: ' + res.status;
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      preview.innerHTML = `<img src="${url}" alt="result" />`;
    });
  </script>
</body>
</html>
